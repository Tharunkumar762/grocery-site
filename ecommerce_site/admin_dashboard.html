<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="dashboard">
    <h1>Admin Dashboard</h1>

    <div class="section">
        <h3>Registered Users</h3>
        <table id="usersTable">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
            </tr>
        </table>
    </div>

    <div class="section">
        <h3>Orders</h3>
        <table id="ordersTable">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Product</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </table>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
