<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payment</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4CAF50,#34A853);
}

.payment-box{
    width:450px;
    background:rgba(255,255,255,0.95);
    backdrop-filter:blur(10px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    transition:.4s;
}

.payment-box:hover{
    transform:translateY(-8px);
}

h2{
    text-align:center;
    color:#2e7d32;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    border:2px solid #e0e0e0;
    border-radius:12px;
    font-size:15px;
    transition:.3s;
}

input:focus{
    outline:none;
    border-color:#4CAF50;
    box-shadow:0 0 10px rgba(76,175,80,.3);
}

.row{
    display:flex;
    gap:10px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(to right,#43c443,#34a853);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(76,175,80,.4);
}

.secure{
    text-align:center;
    color:#666;
    margin-top:15px;
    font-size:14px;
}

.card-icons{
    text-align:center;
    font-size:35px;
    margin-bottom:20px;
}
</style>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
<div class="payment-box">

    <div class="card-icons">
        💳
    </div>

    <h2>Secure Payment</h2>

    <div class="input-group">
        <input type="text" placeholder="Card Holder Name">
    </div>

    <div class="input-group">
        <input type="text" placeholder="Card Number">
    </div>

    <div class="row">

        <div class="input-group">
            <input type="text" placeholder="MM/YY">
        </div>

        <div class="input-group">
            <input type="password" placeholder="CVV">
        </div>

    </div>

    <button onclick="success()">
    Pay ₹0
    </button>

    <p class="secure">
        🔒 100% Secure Payment Gateway
    </p>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item => {

    let price =
    parseInt(item.price.replace(/[^\d]/g,'')) || 0;

    let qty = item.qty || 1;

    total += price * qty;
});

document.querySelector("button").innerHTML =
`Pay ₹${total}`;

function success(){

    if(total === 0){
        alert("Your cart is empty!");
        return;
    }

    alert("🎉 Payment Successful!\n\nThank you for shopping with Delicacy.");

    localStorage.removeItem("cart");

    window.location.href = "index.html";
}

</script>

</body>
</html>
